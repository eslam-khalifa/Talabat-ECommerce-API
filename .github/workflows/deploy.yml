name: Deploy to MonsterASP

on:
  push:
    branches: [ "main" ] # deployment will be triggered on pushes to the main branch

jobs:
  build-and-deploy:
    runs-on: windows-latest # use Windows runner for WebDeploy

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x # specify your .NET version

      - name: Publish Project
        run: dotnet publish -c Release -o ./publish

      - name: Deploy to MonsterASP
        uses: itsme-shubh/msdeploy-action@v1.0.1
        with:
            server: ${{ secrets.SERVER_COMPUTER_NAME }}
            username: ${{ secrets.SERVER_USERNAME }}
            password: ${{ secrets.SERVER_PASSWORD }}
            sitename: ${{ secrets.WEBSITE_NAME }}
            localpath: './publish'